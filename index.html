<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐸 奶蛙捧腹大笑</title>
<style>
  *, *::after, *::before { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --pink: #ff4da6;
    --yellow: #ffe600;
    --green: #00e676;
    --purple: #b388ff;
    --cyan: #00e5ff;
  }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 30%, #0f3460 60%, #1a1a2e 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
    overflow: hidden;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    position: relative;
  }

  /* ---- 背景抽象浮动元素 ---- */
  .bg-float {
    position: absolute;
    font-size: 2rem;
    opacity: 0.15;
    animation: floatAround 8s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }
  .bg-float:nth-child(1) { top: 10%; left: 5%;  animation-delay: 0s; font-size: 3rem; }
  .bg-float:nth-child(2) { top: 70%; left: 80%; animation-delay: 1.5s; font-size: 2.5rem; }
  .bg-float:nth-child(3) { top: 20%; left: 75%; animation-delay: 3s; font-size: 4rem; }
  .bg-float:nth-child(4) { top: 60%; left: 10%; animation-delay: 4.5s; font-size: 2rem; }
  .bg-float:nth-child(5) { top: 40%; left: 50%; animation-delay: 6s; font-size: 3.5rem; }
  .bg-float:nth-child(6) { top: 85%; left: 40%; animation-delay: 2s; font-size: 2.8rem; }

  @keyframes floatAround {
    0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
    25% { transform: translateY(-30px) rotate(10deg) scale(1.2); }
    50% { transform: translateY(-10px) rotate(-5deg) scale(0.9); }
    75% { transform: translateY(-40px) rotate(8deg) scale(1.1); }
  }

  /* ---- 粒子（点完飞出来的笑字） ---- */
  .laugh-particle {
    position: absolute;
    pointer-events: none;
    font-weight: 900;
    animation: flyUp 1.2s ease-out forwards;
    z-index: 20;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    white-space: nowrap;
  }
  @keyframes flyUp {
    0% {
      opacity: 1;
      transform: translate(0, 0) scale(0.3) rotate(0deg);
    }
    30% {
      opacity: 1;
      transform: translate(var(--dx30), var(--dy30)) scale(1.3) rotate(var(--r30));
    }
    100% {
      opacity: 0;
      transform: translate(var(--dx), var(--dy)) scale(0.5) rotate(var(--r100));
    }
  }

  /* ---- 屏幕震动 ---- */
  .shaking body, .shaking {
    animation: screenShake 0.5s ease-out;
  }
  @keyframes screenShake {
    0%, 100% { transform: translate(0); }
    10% { transform: translate(-6px, 4px); }
    20% { transform: translate(6px, -4px); }
    30% { transform: translate(-8px, -2px); }
    40% { transform: translate(8px, 2px); }
    50% { transform: translate(-4px, 6px); }
    60% { transform: translate(4px, -6px); }
    70% { transform: translate(-2px, 3px); }
    80% { transform: translate(2px, -3px); }
    90% { transform: translate(-1px, 1px); }
  }

  /* ---- 主容器 ---- */
  .main-wrap {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  /* 标题 */
  .title {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 900;
    text-align: center;
    line-height: 1.3;
    background: linear-gradient(90deg, var(--pink), var(--yellow), var(--green), var(--cyan), var(--purple), var(--pink));
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: gradientShift 2s linear infinite;
    filter: drop-shadow(0 0 20px rgba(255,77,166,0.5));
  }
  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }

  /* 奶蛙图片 */
  .naiwa-img {
    width: min(320px, 70vw);
    cursor: pointer;
    transition: transform 0.08s ease;
    filter: drop-shadow(0 0 30px rgba(255, 230, 0, 0.5)) drop-shadow(0 10px 30px rgba(0,0,0,0.4));
    z-index: 10;
  }
  .naiwa-img:hover {
    filter: drop-shadow(0 0 50px rgba(255, 230, 0, 0.8)) drop-shadow(0 15px 40px rgba(0,0,0,0.5));
  }
  .naiwa-img.poked {
    animation: bellyShake 0.6s ease-out;
  }
  @keyframes bellyShake {
    0%, 100% { transform: scale(1) rotate(0deg); }
    5%  { transform: scale(1.15, 0.85) rotate(-2deg); }
    10% { transform: scale(0.85, 1.15) rotate(2deg); }
    15% { transform: scale(1.2, 0.8) rotate(-3deg); }
    20% { transform: scale(0.8, 1.2) rotate(3deg); }
    30% { transform: scale(1.1, 0.9) rotate(-2deg); }
    40% { transform: scale(0.9, 1.1) rotate(1deg); }
    50% { transform: scale(1.08, 0.92) rotate(0deg); }
    60% { transform: scale(0.95, 1.05) rotate(-1deg); }
    80% { transform: scale(1.02, 0.98) rotate(0deg); }
  }

  /* 提示文字 */
  .hint {
    color: rgba(255,255,255,0.6);
    font-size: 1rem;
    letter-spacing: 0.1em;
    animation: bounceHint 1.5s ease-in-out infinite;
  }
  @keyframes bounceHint {
    0%, 100% { transform: translateY(0); opacity: 0.4; }
    50% { transform: translateY(-8px); opacity: 1; }
  }

  /* 计数器 */
  .counter {
    color: var(--yellow);
    font-size: 1.2rem;
    font-weight: 700;
    text-shadow: 0 0 10px rgba(255,230,0,0.6);
    background: rgba(0,0,0,0.4);
    padding: 8px 20px;
    border-radius: 20px;
    backdrop-filter: blur(4px);
  }
  .counter span {
    color: #fff;
    font-size: 1.6rem;
    margin: 0 4px;
  }

  /* 底部 */
  .footer {
    position: absolute;
    bottom: 16px;
    color: rgba(255,255,255,0.25);
    font-size: 0.75rem;
    z-index: 5;
    pointer-events: none;
  }

  /* 响应式 */
  @media (max-width: 480px) {
    .naiwa-img { width: min(260px, 65vw); }
    .title { font-size: 1.8rem; }
  }
</style>
</head>
<body>

<!-- 背景浮动抽象元素 -->
<div class="bg-float">🐸</div>
<div class="bg-float">🤣</div>
<div class="bg-float">💥</div>
<div class="bg-float">🔥</div>
<div class="bg-float">😂</div>
<div class="bg-float">💀</div>

<div class="main-wrap" id="mainWrap">
  <h1 class="title">🐸 戳我！奶蛙</h1>

  <img
    class="naiwa-img"
    id="naiwaImg"
    src="naiwa.png"
    alt="奶蛙"
    draggable="false"
  />

  <p class="hint">👆 戳奶蛙的肚子！</p>

  <div class="counter">
    🐸 已被戳 <span id="count">0</span> 次
  </div>
</div>

<div class="footer">奶蛙网站 · 仅供娱乐 · 奶蛙形象源自网络迷因</div>

<script>
  (function() {
    const img = document.getElementById('naiwaImg');
    const mainWrap = document.getElementById('mainWrap');
    const counter = document.getElementById('count');
    const body = document.body;

    // 笑声
    const laughAudio = new Audio('laugh.mp3');
    laughAudio.preload = 'auto';

    // 笑文字库
    const laughTexts = [
      '哈', '哈哈', '哈哈哈', '哈哈哈哈',
      '笑死', '绷不住了', '绝了', '草',
      '🤣', '😂', '💀', '笑死了',
      '蚌埠住了', '难绷', '太抽象了',
      '哈哈哈哈哈哈', '嗝~', '啊啊啊',
    ];

    let count = 0;
    let isAnimating = false;

    // 生成随机颜色
    function randomColor() {
      const colors = [
        '#ff4da6', '#ffe600', '#00e676', '#b388ff',
        '#00e5ff', '#ff6d00', '#ff1744', '#76ff03',
        '#ea80fc', '#40c4ff',
      ];
      return colors[Math.floor(Math.random() * colors.length)];
    }

    // 生成随机笑文字
    function randomText() {
      return laughTexts[Math.floor(Math.random() * laughTexts.length)];
    }

    // 飞出文字粒子
    function spawnParticles(x, y) {
      const count = Math.floor(Math.random() * 6) + 6; // 6-12个
      for (let i = 0; i < count; i++) {
        const particle = document.createElement('span');
        particle.className = 'laugh-particle';
        particle.textContent = randomText();
        particle.style.left = x + 'px';
        particle.style.top = y + 'px';
        particle.style.color = randomColor();
        particle.style.fontSize = (Math.random() * 24 + 16) + 'px';

        // 随机飞出方向
        const angle = (Math.random() * Math.PI) - Math.PI / 2; // 向上扇形
        const distance = Math.random() * 200 + 80;
        const dx = Math.cos(angle) * distance;
        const dy = Math.sin(angle) * distance - 60; // 往上偏

        particle.style.setProperty('--dx', dx + 'px');
        particle.style.setProperty('--dy', dy + 'px');
        particle.style.setProperty('--dx30', (dx * 0.3) + 'px');
        particle.style.setProperty('--dy30', (dy * 0.3) + 'px');
        particle.style.setProperty('--r30', (Math.random() * 30 - 15) + 'deg');
        particle.style.setProperty('--r100', (Math.random() * 60 - 30) + 'deg');

        body.appendChild(particle);

        // 自动清除
        setTimeout(() => particle.remove(), 1300);
      }
    }

    // 屏幕震动
    function triggerScreenShake() {
      document.documentElement.classList.add('shaking');
      setTimeout(() => document.documentElement.classList.remove('shaking'), 500);
    }

    // 播放笑声
    function playLaugh() {
      // 重置音频实现快速连续点击
      laughAudio.currentTime = 0;
      laughAudio.play().catch(() => {}); // 忽略自动播放被拦截的错误
    }

    // 主交互
    function pokeNaiwa(e) {
      if (isAnimating) return;
      isAnimating = true;

      // 计数
      count++;
      counter.textContent = count;

      // 获取点击位置（相对于视口）
      const clientX = e.clientX || (e.touches && e.touches[0].clientX) || img.getBoundingClientRect().left + img.offsetWidth / 2;
      const clientY = e.clientY || (e.touches && e.touches[0].clientY) || img.getBoundingClientRect().top + img.offsetHeight / 2;

      // 图片抖动
      img.classList.remove('poked');
      void img.offsetWidth; // 强制重绘
      img.classList.add('poked');

      // 飞出文字
      spawnParticles(clientX, clientY);

      // 屏幕震动
      triggerScreenShake();

      // 播放笑声
      playLaugh();

      // 冷却
      setTimeout(() => { isAnimating = false; }, 400);
    }

    // 绑定事件
    img.addEventListener('click', pokeNaiwa);
    img.addEventListener('touchstart', (e) => {
      e.preventDefault();
      pokeNaiwa(e);
    }, { passive: false });

    // 点击空白也能触发（奶蛙精神）
    body.addEventListener('click', (e) => {
      if (e.target === img) return; // 图片自己处理
      // 点击空白处也触发，但用图片中心作为粒子起点
      const rect = img.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      pokeNaiwa({ clientX: cx, clientY: cy });
    });

    // 首次加载时允许音频
    // 部分浏览器需要用户交互后才能播放音频
    document.addEventListener('click', function unlockAudio() {
      laughAudio.play().then(() => {
        laughAudio.pause();
        laughAudio.currentTime = 0;
      }).catch(() => {});
    }, { once: true });

    console.log('🐸 奶蛙捧腹大笑 — 准备好了！戳奶蛙的肚子吧！');
  })();
</script>
</body>
</html>
